name: Deploy Ad Context Projector

on:
    push:
        branches: [main]

permissions:
    contents: read
    id-token: write

jobs:
    deploy:
        uses: krafton-jungle-project-4team/loop-ad_aws_cdk/.github/workflows/ecs-deploy.yml@v1
        with:
            environment: dev
            aws_region: ap-northeast-2
            aws_role_arn: arn:aws:iam::123456789012:role/github-actions-loop-ad-dev
            service_name: ad-context-projector
            ecr_repository: loop-ad/ad-context-projector
            ecs_cluster: dev-loop-ad-cluster
            ecs_service: dev-ad-context-projector
            container_name: ad-context-projector
            dockerfile: Dockerfile
            context: .
            image_tag: ${{ github.sha }}
            wait_for_service_stability: true
