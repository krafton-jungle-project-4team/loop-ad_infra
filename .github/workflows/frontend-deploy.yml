name: Reusable Frontend Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: ap-northeast-2
      aws_role_arn:
        required: true
        type: string
      s3_bucket:
        required: true
        type: string
      cloudfront_distribution_id:
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: npm run build
      artifact_dir:
        required: false
        type: string
        default: dist

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and publish frontend artifact
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: ${{ inputs.build_command }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sync S3 origin
        shell: bash
        env:
          ARTIFACT_DIR: ${{ inputs.artifact_dir }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
        run: |
          set -euo pipefail
          aws s3 sync "${ARTIFACT_DIR}" "s3://${S3_BUCKET}" --delete

      - name: Invalidate CloudFront
        shell: bash
        env:
          DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths '/*'
