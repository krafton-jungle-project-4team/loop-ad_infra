name: Reusable Infra Check

on:
    workflow_call:
        inputs:
            environment:
                description: CDK environment to synthesize.
                required: true
                type: string
            node_version:
                required: true
                type: string

permissions:
    contents: read

jobs:
    check:
        name: Build, test, and synth CDK
        runs-on: ubuntu-latest
        steps:
            - name: Checkout infra repository
              uses: actions/checkout@v4

            - name: Validate required inputs
              shell: bash
              env:
                  ENVIRONMENT: ${{ inputs.environment }}
                  NODE_VERSION: ${{ inputs.node_version }}
              run: |
                  set -euo pipefail

                  for input_name in ENVIRONMENT NODE_VERSION; do
                      if [[ -z "${!input_name}" ]]; then
                          echo "${input_name} input is required." >&2
                          exit 1
                      fi
                  done

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Test
              run: npm test

            - name: Synthesize
              run: npm run synth:${{ inputs.environment }} -- --quiet
