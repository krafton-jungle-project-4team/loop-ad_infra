name: Reusable ECS Deploy

on:
    workflow_call:
        inputs:
            environment:
                description: GitHub environment name used for approval gates.
                required: true
                type: string
            aws_region:
                description: AWS region for ECR/ECS.
                required: true
                type: string
            service_name:
                description: Logical service name used in logs/concurrency.
                required: true
                type: string
            ecr_repository:
                description: Target ECR repository name.
                required: true
                type: string
            ecs_cluster:
                description: ECS cluster name or ARN.
                required: true
                type: string
            ecs_service:
                description: ECS service name.
                required: true
                type: string
            container_name:
                description: Container name inside the task definition.
                required: true
                type: string
            dockerfile:
                description: Dockerfile path in the caller repository.
                required: true
                type: string
            context:
                description: Docker build context in the caller repository.
                required: true
                type: string
            image_tag:
                description: Image tag to deploy.
                required: true
                type: string
            wait_for_service_stability:
                description: Wait until ECS reports the service stable.
                required: true
                type: boolean
        outputs:
            image:
                description: Fully qualified ECR image URI deployed to ECS.
                value: ${{ jobs.deploy.outputs.image }}
        secrets:
            LOOP_AD_DEV_ECS_DEPLOY_ROLE_ARN:
                description: Organization secret containing the IAM role ARN assumed through GitHub OIDC.
                required: true

permissions:
    contents: read
    id-token: write

jobs:
    deploy:
        name: Build image and deploy ECS service
        runs-on: ubuntu-24.04-arm
        environment: ${{ inputs.environment }}
        concurrency:
            group: ecs-${{ inputs.environment }}-${{ inputs.ecs_cluster }}-${{ inputs.ecs_service }}
            cancel-in-progress: false
        outputs:
            image: ${{ steps.image.outputs.image }}
        steps:
            - name: Checkout app repository
              uses: actions/checkout@v4

            - name: Validate required inputs
              shell: bash
              env:
                  AWS_REGION: ${{ inputs.aws_region }}
                  AWS_ROLE_ARN: ${{ secrets.LOOP_AD_DEV_ECS_DEPLOY_ROLE_ARN }}
                  SERVICE_NAME: ${{ inputs.service_name }}
                  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
                  ECS_CLUSTER: ${{ inputs.ecs_cluster }}
                  ECS_SERVICE: ${{ inputs.ecs_service }}
                  CONTAINER_NAME: ${{ inputs.container_name }}
                  DOCKERFILE: ${{ inputs.dockerfile }}
                  BUILD_CONTEXT: ${{ inputs.context }}
                  IMAGE_TAG: ${{ inputs.image_tag }}
                  WAIT_FOR_SERVICE_STABILITY: ${{ inputs.wait_for_service_stability }}
              run: |
                  set -euo pipefail

                  for input_name in \
                      AWS_REGION \
                      AWS_ROLE_ARN \
                      SERVICE_NAME \
                      ECR_REPOSITORY \
                      ECS_CLUSTER \
                      ECS_SERVICE \
                      CONTAINER_NAME \
                      DOCKERFILE \
                      BUILD_CONTEXT \
                      IMAGE_TAG \
                      WAIT_FOR_SERVICE_STABILITY; do
                      if [[ -z "${!input_name}" ]]; then
                          echo "${input_name} input is required." >&2
                          exit 1
                      fi
                  done

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.LOOP_AD_DEV_ECS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ inputs.aws_region }}
                  role-session-name: gha-${{ inputs.service_name }}-${{ github.run_id }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push image
              id: image
              shell: bash
              env:
                  BUILD_CONTEXT: ${{ inputs.context }}
                  DOCKERFILE: ${{ inputs.dockerfile }}
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
                  REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
              run: |
                  set -euo pipefail

                  image_tag="${REQUESTED_IMAGE_TAG}"
                  image="${ECR_REGISTRY}/${ECR_REPOSITORY}:${image_tag}"
                  latest_image="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

                  docker buildx build \
                      --platform linux/arm64 \
                      --file "${DOCKERFILE}" \
                      --tag "${image}" \
                      --tag "${latest_image}" \
                      --push \
                      "${BUILD_CONTEXT}"

                  echo "image=${image}" >> "${GITHUB_OUTPUT}"

            - name: Download current ECS task definition
              shell: bash
              env:
                  ECS_CLUSTER: ${{ inputs.ecs_cluster }}
                  ECS_SERVICE: ${{ inputs.ecs_service }}
              run: |
                  set -euo pipefail

                  task_definition_arn="$(
                      aws ecs describe-services \
                          --cluster "${ECS_CLUSTER}" \
                          --services "${ECS_SERVICE}" \
                          --query 'services[0].taskDefinition' \
                          --output text
                  )"

                  if [ -z "${task_definition_arn}" ] || [ "${task_definition_arn}" = "None" ]; then
                      echo "Unable to resolve task definition for ${ECS_CLUSTER}/${ECS_SERVICE}" >&2
                      exit 1
                  fi

                  aws ecs describe-task-definition \
                      --task-definition "${task_definition_arn}" \
                      --query taskDefinition \
                      > task-definition.json

            - name: Render ECS task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                  task-definition: task-definition.json
                  container-name: ${{ inputs.container_name }}
                  image: ${{ steps.image.outputs.image }}

            - name: Deploy ECS task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                  task-definition: ${{ steps.task-def.outputs.task-definition }}
                  service: ${{ inputs.ecs_service }}
                  cluster: ${{ inputs.ecs_cluster }}
                  wait-for-service-stability: ${{ inputs.wait_for_service_stability }}
                  enable-ecs-managed-tags: true
                  propagate-tags: SERVICE
