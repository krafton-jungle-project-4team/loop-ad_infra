config:
  target: "http://127.0.0.1"
  phases:
    - name: "50k aggregate rps with 20 Fargate workers"
      duration: 300
      arrivalRate: 2500
  defaults:
    headers:
      content-type: "application/json"
  http:
    timeout: 5
scenarios:
  - name: "POST ALB fixed response"
    flow:
      - post:
          url: "/__fixed"
          json:
            event_id: "phase0-fixed-response"
            event_type: "perf.phase0"
            body: ""
